<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resident Secretary</title>
  <style>
    * { box-sizing: border-box; }
    body { width: 320px; margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f19; color: white; }
    h2 { font-size: 15px; margin: 0 0 4px; color: rgba(255,255,255,0.9); }
    .subtitle { font-size: 11px; color: rgba(255,255,255,0.35); margin: 0 0 14px; }
    .shortcut { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.28); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: rgba(255,255,255,0.7); text-align: center; margin-bottom: 14px; }
    kbd { background: rgba(255,255,255,0.1); border-radius: 4px; padding: 2px 6px; font-size: 10px; font-family: monospace; }
    .section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .url-row { display: flex; gap: 6px; align-items: center; }
    .url-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 10px; font-size: 11px; color: white; outline: none; }
    .url-input:focus { border-color: rgba(99,102,241,0.6); }
    .url-input::placeholder { color: rgba(255,255,255,0.25); }
    .btn { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.35); border-radius: 7px; padding: 7px 11px; font-size: 11px; color: #a5b4fc; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .btn:hover { background: rgba(99,102,241,0.35); }
    .btn-save { background: rgba(34,211,166,0.15); border-color: rgba(34,211,166,0.3); color: #6ee7b7; }
    .btn-save:hover { background: rgba(34,211,166,0.28); }
    .status-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; min-height: 18px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok { background: #22d3a6; box-shadow: 0 0 6px #22d3a688; }
    .dot-err { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
    .dot-idle { background: rgba(255,255,255,0.2); }
    .dot-checking { background: #fbbf24; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status-text { font-size: 11px; color: rgba(255,255,255,0.45); }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 12px 0; }
    .active-url { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 10px; word-break: break-all; }
  </style>
</head>
<body>
  <h2>&#x1F916; Resident Secretary</h2>
  <p class="subtitle">AI-powered browser assistant</p>

  <div class="shortcut">Press <kbd>Cmd+Shift+Space</kbd> on any page</div>

  <hr class="divider" />

  <div class="section-label">Backend URL (Vercel)</div>
  <div class="url-row">
    <input class="url-input" id="url-input" type="url" placeholder="https://your-project.vercel.app" />
    <button class="btn btn-save" id="save-btn">Save</button>
    <button class="btn" id="test-btn">Test</button>
  </div>
  <div class="status-row">
    <div class="dot dot-idle" id="status-dot"></div>
    <span class="status-text" id="status-text">Enter your Vercel deployment URL above</span>
  </div>
  <div class="active-url" id="active-url"></div>

  <script src="popup.js"></script>
</body>
</html>
