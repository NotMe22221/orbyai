<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resident Secretary</title>
  <style>
    body { width: 280px; min-height: 160px; margin: 0; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f19; color: white; }
    h2 { font-size: 15px; margin: 0 0 6px; color: rgba(255,255,255,0.9); }
    p { font-size: 12px; color: rgba(255,255,255,0.45); margin: 0 0 16px; }
    .shortcut { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.28); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: rgba(255,255,255,0.75); text-align: center; }
    kbd { background: rgba(255,255,255,0.1); border-radius: 4px; padding: 2px 6px; font-size: 11px; font-family: monospace; }
    .status { margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; }
  </style>
</head>
<body>
  <h2>&#x1F916; Resident Secretary</h2>
  <p>AI-powered browser assistant</p>
  <div class="shortcut">Press <kbd>Cmd+Shift+Space</kbd> on any page</div>
  <div class="status" id="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
