name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    name: Backend — Type Check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  extension-checks:
    name: Extension — Manifest Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('extension/manifest.json', 'utf8'));
            if (manifest.manifest_version !== 3) throw new Error('Must be MV3');
            if (!manifest.background?.service_worker) throw new Error('Missing service worker');
            if (!manifest.commands) throw new Error('Missing commands');
            console.log('Manifest valid:', manifest.name, 'v' + manifest.version);
          "
